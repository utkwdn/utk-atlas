on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next app
        env:
          NEXT_PUBLIC_WORDPRESS_URL: ${{ secrets.NEXT_PUBLIC_WORDPRESS_URL }}
          PRIMARY_DOMAIN: ${{ secrets.PRIMARY_DOMAIN }}
          FAUST_SECRET_KEY: ${{ secrets.FAUST_SECRET_KEY }}
        run: npm run build

      - name: Run Next app
        env:
          NEXT_PUBLIC_WORDPRESS_URL: ${{ secrets.NEXT_PUBLIC_WORDPRESS_URL }}
          PRIMARY_DOMAIN: ${{ secrets.PRIMARY_DOMAIN }}
          FAUST_SECRET_KEY: ${{ secrets.FAUST_SECRET_KEY }}
        run: npm run start &

      - name: Lost Pixel
        uses: lost-pixel/lost-pixel@v3.17.0
